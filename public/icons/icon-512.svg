<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="#FFFFFF"/>
  <rect x="42" y="42" width="428" height="428" rx="76" fill="url(#g)"/>
  <!-- Ledger book spine -->
  <rect x="138" y="118" width="32" height="276" rx="8" fill="#FFFFFF" opacity="0.95"/>
  <!-- Ledger book pages -->
  <rect x="170" y="118" width="204" height="276" rx="10" fill="#FFFFFF" opacity="0.95"/>
  <!-- Ledger lines -->
  <line x1="196" y1="182" x2="348" y2="182" stroke="#7C3AED" stroke-width="6" opacity="0.4"/>
  <line x1="196" y1="224" x2="348" y2="224" stroke="#7C3AED" stroke-width="6" opacity="0.4"/>
  <line x1="196" y1="266" x2="348" y2="266" stroke="#7C3AED" stroke-width="6" opacity="0.4"/>
  <line x1="196" y1="308" x2="348" y2="308" stroke="#7C3AED" stroke-width="6" opacity="0.4"/>
  <!-- Dollar sign -->
  <text x="272" y="368" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="48" font-weight="700" fill="#7C3AED" opacity="0.6">$</text>
  <!-- Checkmark on first line -->
  <polyline points="196,182 208,194 228,166" fill="none" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
