<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="#FFFFFF"/>
  <rect x="16" y="16" width="160" height="160" rx="28" fill="url(#g)"/>
  <!-- Ledger book spine -->
  <rect x="52" y="44" width="12" height="104" rx="3" fill="#FFFFFF" opacity="0.95"/>
  <!-- Ledger book pages -->
  <rect x="64" y="44" width="76" height="104" rx="4" fill="#FFFFFF" opacity="0.95"/>
  <!-- Ledger lines -->
  <line x1="74" y1="68" x2="130" y2="68" stroke="#7C3AED" stroke-width="2.5" opacity="0.4"/>
  <line x1="74" y1="84" x2="130" y2="84" stroke="#7C3AED" stroke-width="2.5" opacity="0.4"/>
  <line x1="74" y1="100" x2="130" y2="100" stroke="#7C3AED" stroke-width="2.5" opacity="0.4"/>
  <line x1="74" y1="116" x2="130" y2="116" stroke="#7C3AED" stroke-width="2.5" opacity="0.4"/>
  <!-- Dollar sign -->
  <text x="102" y="138" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700" fill="#7C3AED" opacity="0.6">$</text>
  <!-- Checkmark on first line -->
  <polyline points="74,68 78,72 86,62" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
